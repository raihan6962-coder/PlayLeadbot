services:
  - type: web
    name: PlayLead-Engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: APPS_SCRIPT_WEB_URL
        sync: false
      - key: EMAIL_SCRIPT_URL
        sync: false
      - key: SENDER_NAME
        sync: false
      - key: SENDER_COMPANY
        sync: false
      - key: TARGET_LEADS
        value: "300"
